services:
  # Backend API
  - type: web
    name: globalpos-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
      - key: DB_HOST
        fromDatabase:
          name: globalpos-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: globalpos-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: globalpos-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: globalpos-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: globalpos-db
          property: password

databases:
  - name: globalpos-db
    databaseName: global_pos
    user: pos_user
